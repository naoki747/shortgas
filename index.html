<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .error {
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
  </style>
</head>
<body>
  <iframe id="frame"></iframe>

  <script>
    // ここを固定サイトにしたいなら書き換え
    const DEFAULT_URL = "https://example.com";

    function getUrlParam() {
      const params = new URLSearchParams(window.location.search);
      return params.get("url");
    }

    const url = getUrlParam() || DEFAULT_URL;

    const iframe = document.getElementById("frame");

    try {
      iframe.src = url;
    } catch (e) {
      document.body.innerHTML = '<div class="error">URLの読み込みに失敗しました</div>';
    }
  </script>
</body>
</html>
