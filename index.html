<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short URL</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --accent:#2563eb;
  --error:#dc2626;
}

*{
  box-sizing:border-box;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

#app{display:none;}

.container{
  max-width:420px;
  margin:0 auto;
  padding:24px 16px 40px;
}

h1{
  text-align:center;
  margin:0 0 20px;
  font-size:24px;
}

/* Tabs */
.tabs{
  display:flex;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:#f9fafb;
  cursor:pointer;
  font-size:14px;
  transition:background .2s,color .2s;
}

.tabs button.active{
  background:var(--accent);
  color:#fff;
}

/* Panels */
.panel{
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  display:none;
  animation:fadeSlide .25s ease;
}

.panel.active{
  display:block;
}

@keyframes fadeSlide{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

/* Form */
.field{margin-bottom:12px;}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

button.main{
  width:100%;
  padding:10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
  cursor:pointer;
  transition:transform .1s,opacity .2s;
}

button.main:active{
  transform:scale(.97);
}

button.sub{
  width:100%;
  padding:10px;
  background:#f3f4f6;
  border:1px solid var(--border);
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}

/* Edit panel animation */
#editPanel{
  overflow:hidden;
  max-height:0;
  transition:max-height .3s ease;
}

#editPanel.open{
  max-height:200px;
}

/* Toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translate(-50%,20px);
  background:#111827;
  color:#fff;
  padding:12px 16px;
  border-radius:8px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}

.toast.error{
  background:var(--error);
}

iframe{
  width:100vw;
  height:100vh;
  border:none;
  display:block;
}
</style>
</head>

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const GAS="https://script.google.com/macros/s/AKfycbyD8ffRUGqqa4h6ASpb8NVk6_okS0Vhyd1deYMqIoFCvC5djGHQ07pTcv14bESiImkVSg/exec";

/* 初期制御 */
(async()=>{
  const id=location.hash.replace("#","")||new URLSearchParams(location.search).get("q");
  if(id){
    const res=await fetch(`${GAS}?action=get&id=${encodeURIComponent(id)}`);
    const data=await res.json();
    if(data.url){
      document.body.innerHTML="";
      const iframe=document.createElement("iframe");
      iframe.src=data.url;
      document.body.appendChild(iframe);
      return;
    }
    document.body.innerHTML="<div style='padding:24px'>Not found</div>";
    return;
  }

  app.style.display="block";
  app.innerHTML=`
    <div class="container">
      <h1>Short URL</h1>

      <div class="tabs">
        <button class="active" onclick="switchTab('create',this)">作成</button>
        <button onclick="switchTab('manage',this)">管理</button>
      </div>

      <div id="create" class="panel active">
        <div class="field">
          <label>ID</label>
          <input id="id">
        </div>
        <div class="field">
          <label>転送先URL</label>
          <input id="url">
        </div>
        <div class="field">
          <label>パスワード</label>
          <input id="password" type="password">
        </div>
        <button class="main" onclick="create()">作成</button>
      </div>

      <div id="manage" class="panel">
        <div class="field">
          <label>ID</label>
          <input id="editId">
        </div>
        <div class="field">
          <label>パスワード</label>
          <input id="editPass" type="password">
        </div>
        <button class="main" onclick="login()">開く</button>

        <div id="editPanel">
          <div class="field">
            <label>新しいURL</label>
            <input id="editUrl">
          </div>
          <button class="main" onclick="update()">更新</button>
          <button class="sub" onclick="remove()">削除</button>
        </div>
      </div>
    </div>
  `;
})();

/* UI */
function switchTab(name,btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(name).classList.add("active");
}

function toast(msg,isError=false){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className="toast show"+(isError?" error":"");
  setTimeout(()=>t.classList.remove("show"),3000);
}

/* API */
async function create(){
  const res=await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({
      action:"create",
      id:id.value,
      url:url.value,
      password:password.value
    })
  });
  const data=await res.json();
  data.error
    ? toast(data.error,true)
    : toast(`作成完了: ${location.origin}/?q=${id.value}`);
}

async function login(){
  const res=await fetch(`${GAS}?action=get&id=${editId.value}`);
  const data=await res.json();
  if(!data.url){toast("見つかりません",true);return;}
  window.currentId=editId.value;
  editUrl.value=data.url;
  editPanel.classList.add("open");
}

async function update(){
  await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({
      action:"update",
      id:window.currentId,
      url:editUrl.value,
      password:editPass.value
    })
  });
  toast("更新しました");
}

async function remove(){
  await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:window.currentId,
      password:editPass.value
    })
  });
  toast("削除しました");
}
</script>
</body>
</html>
