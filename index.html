<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Short URL</title>

<style>
:root{
  --blue:#2563eb;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* ここ重要：初期は完全非表示 */
#app{
  display:none;
}

.container{
  max-width:800px;
  margin:0 auto;
  padding:24px;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid var(--border);
  border-radius:10px;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:var(--blue);
  color:white;
  border:none;
  border-radius:10px;
}

iframe{
  width:100vw;
  height:100vh;
  border:none;
  display:block;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const GAS = "https://script.google.com/macros/s/AKfycbyD8ffRUGqqa4h6ASpb8NVk6_okS0Vhyd1deYMqIoFCvC5djGHQ07pTcv14bESiImkVSg/exec";

/**
 * 最初に完全制御（ここで全部決める）
 */
(async () => {

  const hash = location.hash.replace("#","");
  const query = new URLSearchParams(location.search).get("q");
  const id = hash || query;

  const app = document.getElementById("app");

  // ===== ① URLアクセスモード =====
  if(id){
    const res = await fetch(`${GAS}?action=get&id=${encodeURIComponent(id)}`);
    const data = await res.json();

    if(data.url){
      document.body.innerHTML = "";
      const iframe = document.createElement("iframe");
      iframe.src = data.url;
      document.body.appendChild(iframe);
      return;
    }

    document.body.innerHTML = "<div style='padding:20px'>Not found</div>";
    return;
  }

  // ===== ② ホーム画面 =====
  app.style.display = "block";

  app.innerHTML = `
    <div class="container">

      <div class="card">
        <h2>Short URL</h2>

        <input id="id" placeholder="ID">
        <input id="url" placeholder="URL">
        <input id="password" placeholder="password">

        <button onclick="create()">作成</button>

        <div id="result"></div>
      </div>

      <div class="card">
        <h3>編集</h3>

        <input id="editId" placeholder="ID">
        <input id="editPass" placeholder="password">

        <button onclick="login()">開く</button>

        <div id="editPanel" style="display:none">
          <input id="editUrl" placeholder="new URL">
          <button onclick="update()">更新</button>
          <button onclick="remove()">削除</button>
        </div>
      </div>

    </div>
  `;

})();

/**
 * 作成
 */
async function create(){
  const id = document.getElementById("id").value;
  const url = document.getElementById("url").value;
  const password = document.getElementById("password").value;

  const res = await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({action:"create",id,url,password})
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    data.error || `OK: ${location.origin}/?q=${id}`;
}

/**
 * ログイン
 */
async function login(){
  const id = document.getElementById("editId").value;
  const pass = document.getElementById("editPass").value;

  const res = await fetch(`${GAS}?action=get&id=${id}`);
  const data = await res.json();

  if(!data.url) return alert("not found");

  window.currentId = id;
  document.getElementById("editPanel").style.display = "block";
  document.getElementById("editUrl").value = data.url;
}

/**
 * 更新
 */
async function update(){
  const url = document.getElementById("editUrl").value;
  const password = document.getElementById("editPass").value;

  await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({
      action:"update",
      id:window.currentId,
      url,
      password
    })
  });

  alert("updated");
}

/**
 * 削除
 */
async function remove(){
  const password = document.getElementById("editPass").value;

  await fetch(GAS,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:window.currentId,
      password
    })
  });

  alert("deleted");
}

</script>

</body>
</html>
